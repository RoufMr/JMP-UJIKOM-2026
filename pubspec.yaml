name: survey_produk
description: Aplikasi Surveyor Distribusi Produk - Portofolio JMP BNSP
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Unit 003: Database & Persistence ──────────────
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  path: ^1.9.0

  # ── Unit 006: GPS & Navigasi Lokasi ───────────────
  geolocator: ^11.0.0
  url_launcher: ^6.3.0

  # ── Unit 008: Security ────────────────────────────
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3

  # ── Unit 022: Sensor Kamera ───────────────────────
  image_picker: ^1.0.7

  # ── Unit 025: Network Status ──────────────────────
  connectivity_plus: ^5.0.2

  # ── Unit 001: Info Platform ───────────────────────
  package_info_plus: ^7.0.0
  device_info_plus: ^10.0.0

  # ── UI & Utilities ────────────────────────────────
  intl: ^0.19.0
  permission_handler: ^11.3.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
